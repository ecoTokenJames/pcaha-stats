<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hockey puck - dark disk with 3D perspective -->
  <defs>
    <linearGradient id="puckTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="puckSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>
  <!-- Puck side (3D depth) -->
  <ellipse cx="32" cy="42" rx="28" ry="12" fill="url(#puckSide)"/>
  <rect x="4" y="34" width="56" height="8" fill="url(#puckSide)"/>
  <!-- Puck top face -->
  <ellipse cx="32" cy="34" rx="28" ry="12" fill="url(#puckTop)"/>
  <!-- Top highlight ring -->
  <ellipse cx="32" cy="34" rx="22" ry="9" fill="none" stroke="#444" stroke-width="1.5"/>
  <!-- Subtle top shine -->
  <ellipse cx="28" cy="31" rx="12" ry="5" fill="#333" opacity="0.5"/>
</svg>
